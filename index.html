<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<button id="theme-toggle">🌙 Dark Mode</button>

<h1>Weather Dashboard</h1>

<div class="search-box" style="position: relative; display: inline-block;">

  <input
    type="text"
    id="city"
    placeholder="Enter city name"
    autocomplete="off"
  />

  <button onclick="getWeather()">Search</button>


  <!-- 📍 Geolocation Button -->
  <button id="geo-btn" onclick="getLocationWeather()" title="Use my location">📍</button>

  <ul id="suggestions-list" class="suggestions-list"></ul>


</div>

<!-- ✅ Unit Toggle Button -->
<button id="unit-toggle">Switch to °F</button>

<!-- 📍 Geolocation error message -->
<p id="geo-error" class="hidden geo-error-msg"></p>

<div id="weather-card">

  <!-- ⏳ Loading Spinner -->
  <div id="weather-card">

  <!-- ⏳ Loading Spinner -->
  <div id="loading-spinner" class="spinner hidden">
    <div class="spinner-circle"></div>
  </div>

  <h2 id="name">City</h2>

  <p id="temp">-- °C</p>

  <p id="condition"></p>

  <img id="icon" alt="">

  <!-- EXTRA WEATHER DETAILS -->
  <div id="weather-details" class="weather-details hidden">

    <div class="detail-box">
      <span>💧 Humidity</span>
      <p id="humidity">--%</p>
    </div>

    <div class="detail-box">
      <span>🌬 Wind</span>
      <p id="wind">-- km/h</p>
    </div>

    <div class="detail-box">
      <span>🌡 Feels Like</span>
      <p id="feels-like">-- °C</p>
    </div>

  </div>

  <!-- FORECAST -->
  <div id="forecast" class="forecast-container"></div>

</div>
  

<div class="airquality">
  <button>AQ-check</button>
</div>

<div id="aq-result"></div>
<script src="script.js"></script>

</body>

</html>
