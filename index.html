<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<button id="theme-toggle">
  <svg class="theme-icon"><use href="assets/icons.svg#icon-moon"></use></svg>
  <p class="theme-label">Dark Mode</p>
</button>

<h1>Weather Dashboard</h1>

<div class="search-box">

  <div class="input-wrapper">
    <input
      type="text"
      id="city"
      placeholder="Enter city name"
      autocomplete="off"
    />

    <button id="clear-btn" aria-label="Clear">
      <svg class="search-icon"><use href="assets/icons.svg#icon-x"></use></svg>
    </button>

    <ul id="suggestions-list" class="suggestions-list"></ul>
  </div>

  <button onclick="getWeather()" aria-label="Search">
    <svg class="search-icon"><use href="assets/icons.svg#icon-search"></use></svg>
  </button>

</div>

<div id="weather-card">

  <h2 id="name">City</h2>

  <div class="temp-row">
    <p id="temp">--</p>
    <div id="unit-pill">
      <button class="unit-btn active" data-unit="C">°C</button>
      <button class="unit-btn" data-unit="F">°F</button>
    </div>
  </div>

  <p id="condition"></p>

  <img id="icon" alt="">

</div>

<script src="script.js"></script>

</body>

</html>
